<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KartikOS v6.0</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--s1:#141420;--s2:#1a1a28;--s3:#0f0f1a;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
  --a1:#5eb8ff;--a2:#ffb347;--a3:#5dde8a;--a4:#ff7b7b;--a5:#c084fc;
  --tx:#dde6f0;--dim:rgba(221,230,240,.42);--glass:rgba(255,255,255,.025);
  --tbh:#10101c;--mobile:0;
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased;touch-action:none}
body{cursor:none}
@media(max-width:768px){body{cursor:auto}}

/* ═══ CURSOR (desktop only) ═══ */
#cur,#cur-r{position:fixed;pointer-events:none;z-index:999999;transform:translate(-50%,-50%);will-change:left,top}
#cur{width:10px;height:10px;background:var(--a1);border-radius:50%;box-shadow:0 0 14px var(--a1)}
#cur-r{width:32px;height:32px;border:1px solid rgba(94,184,255,.3);border-radius:50%;transition:width .15s,height .15s,opacity .15s}
@media(max-width:768px){#cur,#cur-r{display:none}}

/* ═══ BOOT ═══ */
#boot{position:fixed;inset:0;background:#000;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.bl-logo{font-family:'Syne',sans-serif;font-size:clamp(2rem,8vw,3.4rem);font-weight:800;background:linear-gradient(135deg,#fff 0%,var(--a1) 50%,var(--a2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bl-ver{color:var(--dim);font-size:.63rem;letter-spacing:4px;margin:5px 0 42px;text-align:center}
.bl-log{width:min(450px,90vw);font-size:.67rem;min-height:140px}
.bline{padding:2px 0;line-height:1.6;color:var(--dim);opacity:0;animation:fi .1s forwards}
.bline.ok::after{content:' [OK]';color:var(--a3)}.bline.warn::after{content:' [WARN]';color:var(--a2)}.bline.hi{color:var(--a1)}
@keyframes fi{to{opacity:1}}
.bl-bw{width:min(450px,90vw);height:1.5px;background:rgba(255,255,255,.05);margin-top:16px;border-radius:2px;overflow:hidden}
.bl-bf{height:100%;width:0;background:linear-gradient(90deg,var(--a1),var(--a2));box-shadow:0 0 8px var(--a1);transition:width .2s}

/* ═══ LOCK ═══ */
#lock{position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#lc{position:absolute;inset:0;width:100%;height:100%}
.lui{position:relative;z-index:1;text-align:center;padding:20px}
.lt{font-family:'Syne',sans-serif;font-size:clamp(3rem,12vw,5rem);font-weight:800;color:#fff;text-shadow:0 0 50px rgba(94,184,255,.35);line-height:1}
.ld{color:rgba(255,255,255,.4);font-size:.7rem;letter-spacing:3px;margin-top:5px}
.lh{color:rgba(255,255,255,.22);font-size:.63rem;letter-spacing:2px;margin-top:24px;animation:glw 2.5s infinite}
@keyframes glw{0%,100%{opacity:.22}50%{opacity:.65;text-shadow:0 0 12px rgba(94,184,255,.5)}}

/* ═══ DESKTOP ═══ */
#desk{position:fixed;inset:0;z-index:1;display:none;overflow:hidden}
#wp{position:absolute;inset:0;width:100%;height:100%}

/* ═══ SOUND TOGGLE ═══ */
#sound-btn{position:fixed;top:12px;right:12px;z-index:9000;width:34px;height:34px;border-radius:8px;background:rgba(10,10,20,.8);border:1px solid var(--bd);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .2s;backdrop-filter:blur(10px)}
#sound-btn:hover{border-color:var(--a1);box-shadow:0 0 10px rgba(94,184,255,.2)}
#sound-btn.muted{opacity:.5}

/* ═══ TASKBAR ═══ */
#tb{position:fixed;bottom:0;left:0;right:0;height:48px;background:rgba(8,8,16,.92);backdrop-filter:blur(40px);border-top:1px solid rgba(255,255,255,.05);z-index:8000;display:flex;align-items:center;padding:0 8px;gap:0;overflow:hidden}
.tb-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(.75rem,.9rem,1rem);background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:6px 10px;border-radius:6px;cursor:pointer;flex-shrink:0}
.tb-sep{width:1px;height:26px;background:var(--bd);margin:0 6px;flex-shrink:0}
.tb-apps{display:flex;gap:2px;flex:1;overflow-x:auto;overflow-y:hidden;align-items:center;scrollbar-width:none}
.tb-apps::-webkit-scrollbar{display:none}
.tbb{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:6px;cursor:pointer;font-size:.65rem;color:var(--dim);transition:all .15s;border:1px solid transparent;white-space:nowrap;flex-shrink:0;max-width:130px;overflow:hidden;position:relative;user-select:none}
.tbb:hover{background:rgba(255,255,255,.05);color:var(--tx);border-color:var(--bd)}
.tbb.on{background:rgba(94,184,255,.07);color:var(--a1);border-color:rgba(94,184,255,.18)}
.tbb.minimized-indicator::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--a1);box-shadow:0 0 4px var(--a1)}
.tb-r{display:flex;align-items:center;gap:8px;padding-left:8px;border-left:1px solid var(--bd);flex-shrink:0}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--a3);box-shadow:0 0 6px var(--a3);animation:glw 2s infinite}
.tb-time{font-size:.65rem;color:var(--dim)}
.tb-wpb{font-size:.62rem;color:var(--dim);cursor:pointer;padding:4px 7px;border-radius:4px;border:1px solid var(--bd);transition:all .2s;white-space:nowrap}
.tb-wpb:hover{border-color:var(--a1);color:var(--a1)}

/* ═══ TASKBAR RIGHT-CLICK MENU ═══ */
#tb-ctx{position:fixed;background:rgba(10,10,20,.97);border:1px solid var(--bd2);border-radius:10px;padding:5px;z-index:99999;min-width:160px;box-shadow:0 8px 28px rgba(0,0,0,.6);display:none;backdrop-filter:blur(20px)}
.tb-cx{padding:6px 12px;border-radius:5px;font-size:.7rem;color:var(--dim);cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .1s}
.tb-cx:hover{background:rgba(94,184,255,.09);color:var(--tx)}
.tb-cx.danger:hover{background:rgba(255,123,123,.09);color:var(--a4)}
.tb-cx-s{height:1px;background:var(--bd);margin:3px 0}

/* ═══ ICONS ═══ */
#icons{position:absolute;top:0;left:0;right:0;bottom:48px;pointer-events:none;touch-action:none}
.dicon{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 6px 6px;border-radius:10px;cursor:pointer;width:72px;text-align:center;pointer-events:all;user-select:none;transition:background .14s;z-index:100;touch-action:none}
.dicon:hover,.dicon:active{background:rgba(255,255,255,.08)}
.dicon.sel{background:rgba(94,184,255,.13);outline:1px solid rgba(94,184,255,.28)}
.die{font-size:clamp(1.6rem,2.2rem,2.4rem);line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));pointer-events:none;transition:transform .14s}
.dicon:hover .die{transform:scale(1.08) translateY(-2px)}
.dil{font-size:.55rem;color:rgba(255,255,255,.78);letter-spacing:.3px;text-shadow:0 1px 4px rgba(0,0,0,.95);pointer-events:none;line-height:1.3;word-break:break-word;max-width:68px}
@media(max-width:768px){
  .dicon{width:64px;padding:6px 4px 5px}
  .die{font-size:1.8rem}
  .dil{font-size:.5rem}
}

/* ═══ WINDOW ═══ */
.win{position:absolute;background:var(--s1);border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);overflow:hidden;display:flex;flex-direction:column;min-width:280px;min-height:180px;border:1px solid rgba(255,255,255,.06);transform-origin:bottom center}
.win.focused{box-shadow:0 28px 72px rgba(0,0,0,.85),0 0 0 1px rgba(94,184,255,.09),0 0 50px rgba(94,184,255,.025)}

/* macOS-style open animation */
@keyframes winOpen{
  from{transform:scale(.4) translateY(60px);opacity:0;filter:blur(4px)}
  60%{transform:scale(1.03) translateY(-3px);opacity:1;filter:blur(0)}
  to{transform:scale(1) translateY(0);opacity:1;filter:blur(0)}
}
/* macOS genie minimize animation */
@keyframes genie{
  0%{transform:scale(1) translateY(0) scaleX(1);opacity:1;border-radius:12px}
  30%{transform:scale(.8) translateY(20px) scaleX(.9);opacity:.9;border-radius:16px}
  70%{transform:scale(.3) translateY(80px) scaleX(.4);opacity:.5;border-radius:50%}
  100%{transform:scale(.05) translateY(150px) scaleX(.1);opacity:0;border-radius:50%}
}
@keyframes genieRestore{
  0%{transform:scale(.05) translateY(150px) scaleX(.1);opacity:0;border-radius:50%}
  30%{transform:scale(.3) translateY(80px) scaleX(.4);opacity:.5;border-radius:50%}
  70%{transform:scale(.8) translateY(20px) scaleX(.9);opacity:.9;border-radius:16px}
  90%{transform:scale(1.03) translateY(-3px) scaleX(1);opacity:1;border-radius:12px}
  100%{transform:scale(1) translateY(0) scaleX(1);opacity:1;border-radius:12px}
}
@keyframes winClose{
  from{transform:scale(1);opacity:1}
  to{transform:scale(.85);opacity:0}
}
.win.anim-open{animation:winOpen .35s cubic-bezier(.34,1.56,.64,1) forwards}
.win.anim-close{animation:winClose .18s ease forwards}
.win.anim-min{animation:genie .32s cubic-bezier(.4,0,.6,1) forwards}
.win.anim-restore{animation:genieRestore .34s cubic-bezier(.34,1.2,.64,1) forwards}

/* TITLEBAR */
.win-tb{display:flex;align-items:center;height:38px;padding:0 12px;background:var(--tbh);border-bottom:1px solid var(--bd);cursor:move;user-select:none;flex-shrink:0;gap:8px;position:relative;touch-action:none}
.tlts{display:flex;gap:7px;align-items:center;flex-shrink:0;z-index:1}
.tl{width:13px;height:13px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;position:relative;flex-shrink:0}
.tl:hover{filter:brightness(1.15);transform:scale(1.1)}
.tl-x{background:#ff5f57}.tl-m{background:#febc2e}.tl-z{background:#28c840}
.tl-ic{position:absolute;font-size:7px;font-weight:900;color:rgba(0,0,0,.7);opacity:0;transition:opacity .1s;pointer-events:none;font-family:Arial,sans-serif;line-height:1;top:50%;left:50%;transform:translate(-50%,-50%)}
.win-tb:hover .tl-ic{opacity:1}
.win-ttl{font-size:.67rem;color:var(--dim);letter-spacing:.6px;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%;pointer-events:none}
/* Resize handles */
.rsh{position:absolute;z-index:20}
.rsh-se{bottom:0;right:0;width:16px;height:16px;cursor:se-resize}.rsh-se::after{content:'';position:absolute;bottom:3px;right:3px;width:9px;height:9px;border-right:2px solid rgba(255,255,255,.14);border-bottom:2px solid rgba(255,255,255,.14)}
.rsh-s{bottom:0;left:16px;right:16px;height:6px;cursor:s-resize}
.rsh-e{right:0;top:38px;bottom:16px;width:6px;cursor:e-resize}
.rsh-n{top:0;left:16px;right:16px;height:6px;cursor:n-resize}
.rsh-w{left:0;top:38px;bottom:16px;width:6px;cursor:w-resize}
.rsh-sw{bottom:0;left:0;width:16px;height:16px;cursor:sw-resize}
.rsh-ne{top:0;right:0;width:16px;height:16px;cursor:ne-resize}
.rsh-nw{top:0;left:0;width:16px;height:16px;cursor:nw-resize}
.win-body{flex:1;overflow:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.07) transparent;-webkit-overflow-scrolling:touch}
.win-body::-webkit-scrollbar{width:4px}.win-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}
@media(max-width:768px){
  .win{min-width:90vw;border-radius:10px}
  .win-ttl{max-width:45%;font-size:.6rem}
  .rsh-s,.rsh-e,.rsh-n,.rsh-w,.rsh-sw,.rsh-ne,.rsh-nw{display:none}
}

/* WP PICKER */
#wpbar{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.96);border:1px solid var(--bd2);border-radius:14px;padding:14px 16px;z-index:9000;display:none;backdrop-filter:blur(30px);box-shadow:0 16px 40px rgba(0,0,0,.5);max-width:95vw;overflow-x:auto}
.wpt{font-size:.58rem;letter-spacing:3px;color:var(--a1);margin-bottom:12px;text-transform:uppercase}
.wp-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:nowrap}
.wpc{display:flex;flex-direction:column;gap:5px;cursor:pointer;flex-shrink:0}
.wpt-fr{width:72px;height:46px;border-radius:7px;overflow:hidden;border:2px solid transparent;transition:all .18s}
.wpt-fr:hover,.wpt-fr:active{border-color:var(--a1);transform:scale(1.05)}
.wpt-fr.act{border-color:var(--a2);box-shadow:0 0 14px rgba(255,179,71,.35)}
.wpt-fr canvas{width:100%;height:100%;display:block}
.wpl{font-size:.54rem;color:var(--dim);text-align:center;letter-spacing:.5px}

/* ═══ CONTENT STYLES ═══ */
.aw{padding:20px;font-size:.77rem;line-height:1.85;color:var(--dim)}
.ah{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
.av{width:58px;height:58px;border-radius:50%;border:2px solid rgba(94,184,255,.25);display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;background:radial-gradient(circle,rgba(94,184,255,.08),transparent);animation:bob 4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.an{font-family:'Syne',sans-serif;font-size:clamp(1.1rem,3vw,1.35rem);font-weight:800;color:var(--tx);line-height:1}
.ar{color:var(--a1);font-size:.6rem;letter-spacing:2px;margin-top:4px}
.alo{color:var(--dim);font-size:.6rem;margin-top:2px}
.sts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}
.st{background:var(--glass);border:1px solid var(--bd);border-radius:7px;padding:10px;text-align:center}
.stv{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--a1);display:block}
.stk{font-size:.55rem;color:var(--dim);letter-spacing:1px;margin-top:1px;display:block}
.sec{font-size:.57rem;letter-spacing:3px;color:var(--a2);text-transform:uppercase;margin:14px 0 6px;border-bottom:1px solid var(--bd);padding-bottom:5px}
/* Projects */
.plist{list-style:none}
.pi{padding:0;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .14s}
.pi:hover{background:rgba(94,184,255,.03)}
.pi.opn{background:rgba(94,184,255,.05);border-left:2px solid var(--a1)}
.pi-head{display:grid;grid-template-columns:32px 1fr 14px;gap:10px;align-items:start;padding:13px 16px}
.pnum{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:rgba(255,255,255,.05);line-height:1}
.pi-info h3{font-size:.75rem;color:var(--tx);font-weight:500;margin-bottom:3px}
.pi-info p{font-size:.65rem;color:var(--dim);line-height:1.55}
.pchips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{padding:2px 7px;border-radius:20px;font-size:.57rem;background:rgba(94,184,255,.07);border:1px solid rgba(94,184,255,.14);color:rgba(94,184,255,.85)}
.parr{color:var(--dim);font-size:.7rem;padding-top:2px;transition:all .18s;flex-shrink:0}
.pi:hover .parr{transform:translateX(3px);color:var(--a1)}
.pd{padding:0 16px 14px;display:none;background:var(--s3)}
.pd.show{display:block}
.pimg-wrap{border-radius:7px;overflow:hidden;margin-bottom:10px;border:1px solid var(--bd);background:var(--s2)}
.pimg{width:100%;height:130px;object-fit:cover;display:block}
.pimg-ph{width:100%;height:110px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--s2),var(--s3));position:relative;overflow:hidden}
.pimg-ph::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(94,184,255,.04),rgba(192,132,252,.04))}
.pgrid{display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(4,1fr);gap:3px;padding:10px;width:100%;height:100%}
.pgc{border-radius:2px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.pgc.l1{background:rgba(94,184,255,.15);border-color:rgba(94,184,255,.25)}
.pgc.l2{background:rgba(192,132,252,.12);border-color:rgba(192,132,252,.22)}
.pgc.l3{background:rgba(93,222,138,.1);border-color:rgba(93,222,138,.2)}
.proj-links{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.pl{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;font-size:.6rem;text-decoration:none;transition:all .16s;cursor:pointer;border:1px solid var(--bd)}
.pl.demo{background:rgba(94,184,255,.08);border-color:rgba(94,184,255,.2);color:var(--a1)}
.pl.demo:hover{background:rgba(94,184,255,.16)}
.pl.code{background:rgba(255,255,255,.04);color:var(--dim)}
.pl.code:hover{background:rgba(255,255,255,.08);color:var(--tx)}
.pl.setl{background:rgba(255,179,71,.07);border-color:rgba(255,179,71,.2);color:var(--a2)}
.img-ua{border:1.5px dashed rgba(94,184,255,.2);border-radius:7px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(94,184,255,.02);margin-bottom:10px}
.img-ua:hover{border-color:var(--a1);background:rgba(94,184,255,.05)}
.img-ua input{display:none}
.img-ua-t{font-size:.63rem;color:var(--dim);margin-top:5px}
.img-ua-t span{color:var(--a1)}
.pd h4{font-size:.57rem;color:var(--a1);letter-spacing:2px;margin-bottom:7px}
.feats{list-style:none}
.feats li{font-size:.65rem;color:var(--dim);padding:2px 0 2px 11px;position:relative;line-height:1.55}
.feats li::before{content:'→';position:absolute;left:0;color:var(--a1);font-size:.6rem}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.badge{padding:2px 8px;border-radius:4px;font-size:.58rem;background:rgba(93,222,138,.07);border:1px solid rgba(93,222,138,.18);color:var(--a3)}
/* Skills */
.skw{padding:18px}
.skcat{margin-bottom:16px}
.skcatt{font-size:.57rem;letter-spacing:3px;color:var(--a2);text-transform:uppercase;margin-bottom:8px}
.skrows{display:flex;flex-direction:column;gap:7px}
.skr{display:grid;grid-template-columns:110px 1fr 28px;align-items:center;gap:8px}
.skn{font-size:.65rem;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.skbg{height:3.5px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.skf{height:100%;border-radius:2px;width:0;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.f1{background:linear-gradient(90deg,rgba(94,184,255,.2),var(--a1))}.f2{background:linear-gradient(90deg,rgba(93,222,138,.2),var(--a3))}.f3{background:linear-gradient(90deg,rgba(255,179,71,.2),var(--a2))}.f4{background:linear-gradient(90deg,rgba(255,123,123,.2),var(--a4))}.f5{background:linear-gradient(90deg,rgba(192,132,252,.2),var(--a5))}
.skp{font-size:.58rem;color:var(--dim);text-align:right}
/* Experience */
.exw{padding:18px}
.exb{padding:12px 0;border-bottom:1px solid var(--bd);display:grid;grid-template-columns:72px 1fr;gap:12px}
.exb:last-child{border-bottom:none}
.exd{font-size:.58rem;color:var(--dim);line-height:1.8;padding-top:2px}
.exbd h3{font-size:.75rem;color:var(--tx);font-weight:500;margin-bottom:2px}
.exbd h4{font-size:.62rem;color:var(--a1);margin-bottom:7px}
.exbd ul{list-style:none}
.exbd ul li{font-size:.65rem;color:var(--dim);padding:2px 0 2px 11px;position:relative;line-height:1.5}
.exbd ul li::before{content:'▸';position:absolute;left:0;color:var(--a1);font-size:.58rem}
.hl{color:var(--a3)!important}
/* Terminal */
.term{background:#000;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--tx);padding:12px;height:100%;display:flex;flex-direction:column}
.tout{flex:1;overflow-y:auto;margin-bottom:7px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.05) transparent;-webkit-overflow-scrolling:touch}

<script>
// ════════════════════════════════════════
//  AUDIO ENGINE
// ════════════════════════════════════════
let soundOn=true;
const AC=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function getAC(){if(!audioCtx&&AC){try{audioCtx=new AC()}catch(e){}}return audioCtx}
function playTone(freq,dur,type='sine',vol=.12,attack=.01,decay=.15){
  if(!soundOn)return;const ac=getAC();if(!ac)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,ac.currentTime);g.gain.linearRampToValueAtTime(vol,ac.currentTime+attack);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);
    o.start(ac.currentTime);o.stop(ac.currentTime+dur+decay);
  }catch(e){}
}
function sndClick(){playTone(800,.08,'sine',.08)}
function sndOpen(){playTone(440,.06,'sine',.07);setTimeout(()=>playTone(660,.1,'sine',.06),60);setTimeout(()=>playTone(880,.15,'sine',.05),130)}
function sndClose(){playTone(660,.08,'sine',.07);setTimeout(()=>playTone(440,.12,'sine',.05),60)}
function sndMin(){playTone(520,.08,'sine',.06);setTimeout(()=>playTone(380,.14,'sine',.04),70)}
function sndRestore(){playTone(380,.06,'sine',.05);setTimeout(()=>playTone(520,.08,'sine',.06),60);setTimeout(()=>playTone(700,.12,'sine',.04),130)}
function sndNotif(){playTone(660,.06,'sine',.06);setTimeout(()=>playTone(880,.1,'sine',.04),80)}
function sndError(){playTone(220,.15,'sawtooth',.06)}
function toggleSound(){
  soundOn=!soundOn;const btn=document.getElementById('sound-btn');
  btn.textContent=soundOn?'🔊':'🔇';btn.classList.toggle('muted',!soundOn);
  if(soundOn)sndNotif();
}
document.addEventListener('click',()=>{const ac=getAC();if(ac&&ac.state==='suspended')ac.resume()},{once:true});
document.addEventListener('touchstart',()=>{const ac=getAC();if(ac&&ac.state==='suspended')ac.resume()},{once:true});

// ════════════════════════════════════════
//  CURSOR (desktop)
// ════════════════════════════════════════
const CUR=document.getElementById('cur'),CR=document.getElementById('cur-r');
let mx=0,my=0,rx=0,ry=0;
const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
if(!isTouch){
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;CUR.style.left=mx+'px';CUR.style.top=my+'px'});
  (function lp(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;CR.style.left=rx+'px';CR.style.top=ry+'px';requestAnimationFrame(lp)})();
  document.addEventListener('mousedown',()=>{CUR.style.transform='translate(-50%,-50%) scale(.5)';CR.style.width='44px';CR.style.height='44px'});
  document.addEventListener('mouseup',()=>{CUR.style.transform='translate(-50%,-50%) scale(1)';CR.style.width='32px';CR.style.height='32px'});
}

// ════════════════════════════════════════
//  CLOCK
// ════════════════════════════════════════
function clk(){
  const n=new Date();
  document.getElementById('ltime').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  document.getElementById('ldate').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'2-digit'}).toUpperCase();
  document.getElementById('tbt').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
}
clk();setInterval(clk,1000);

// ════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════
const BL=[
  {t:'Initializing KartikOS v6.0...',c:'ok',d:80},
  {t:'Loading portfolio kernel...',c:'ok',d:200},
  {t:'Mounting wallpaper engine (5 themes)...',c:'ok',d:310},
  {t:'Loading code editor (8 languages)...',c:'ok',d:420},
  {t:'Registering touch & sound systems...',c:'ok',d:520},
  {t:'WARN: Exceptional skill density detected',c:'warn',d:620},
  {t:'Starting macOS animation engine...',c:'ok',d:720},
  {t:'Developer profile: kartik.kumar loaded.',c:'hi',d:870},
];
const blog=document.getElementById('blog'),bbf=document.getElementById('bbf');
BL.forEach((l,i)=>setTimeout(()=>{const d=document.createElement('div');d.className='bline '+(l.c||'');d.textContent='> '+l.t;blog.appendChild(d);bbf.style.width=((i+1)/BL.length*100)+'%'},l.d));
setTimeout(()=>{const b=document.getElementById('boot');b.style.transition='opacity .5s';b.style.opacity='0';setTimeout(()=>{b.style.display='none';showLock()},500)},1500);

// ════════════════════════════════════════
//  LOCK
// ════════════════════════════════════════
function showLock(){
  const ls=document.getElementById('lock');ls.style.display='flex';initLC();
  ls.addEventListener('click',unlock,{once:true});
  ls.addEventListener('touchstart',unlock,{once:true,passive:true});
  function sp(e){if(e.code==='Space'){e.preventDefault();unlock();document.removeEventListener('keydown',sp)}}
  document.addEventListener('keydown',sp);
}
function initLC(){
  const c=document.getElementById('lc');c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  const pts=Array.from({length:120},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.3+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,a:Math.random()*Math.PI*2}));
  let running=true;
  function draw(){
    if(!running)return;
    ctx.fillStyle='rgba(3,3,10,.87)';ctx.fillRect(0,0,c.width,c.height);
    ctx.strokeStyle='rgba(94,184,255,.025)';ctx.lineWidth=1;
    for(let x=0;x<c.width;x+=70){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke()}
    for(let y=0;y<c.height;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke()}
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.a+=.006;if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(94,184,255,${.2+Math.sin(p.a)*.14})`;ctx.fill()});
    requestAnimationFrame(draw);
  }draw();
  return()=>{running=false};
}
function unlock(){sndOpen();const ls=document.getElementById('lock');ls.style.transition='opacity .4s';ls.style.opacity='0';setTimeout(()=>{ls.style.display='none';startDesk()},400)}

// ════════════════════════════════════════
//  WALLPAPERS
// ════════════════════════════════════════
let wpI=0,wpRaf=null,wpT=0,wpS={};
const WPS=[

function placeIcons(){
  const layer=document.getElementById('icons');layer.innerHTML='';
  const W=window.innerWidth,H=window.innerHeight-48;
  const rows=Math.max(1,Math.floor(H/78));
  IDEFS.forEach((def,i)=>{

function mkIcon(def,layer){
  const el=document.createElement('div');el.className='dicon';el.id='ic-'+def.id;
  el.style.left=iPos[def.id].x+'px';el.style.top=iPos[def.id].y+'px';

  mkDragIcon(el,def.id);
  layer.appendChild(el);

function mkDragIcon(el,id){
  let drag=false,ox=0,oy=0,moved=false,tapTimer=null,lastTap=0;
  // Mouse
  el.addEventListener('mousedown',e=>{if(e.button!==0)return;drag=true;moved=false;ox=e.clientX-el.offsetLeft;oy=e.clientY-el.offsetTop;el.style.zIndex='500';el.classList.add('sel');e.stopPropagation();e.preventDefault()});
  document.addEventListener('mousemove',e=>{if(!drag)return;moved=true;const nx=Math.max(0,Math.min(e.clientX-ox,window.innerWidth-76));const ny=Math.max(0,Math.min(e.clientY-oy,window.innerHeight-88));el.style.left=nx+'px';el.style.top=ny+'px';iPos[id]={x:nx,y:ny}});

    if(!drag)return;moved=true;const t=e.touches[0];

let OW={},zT=100,aW=null,tbCtxWin=null;

function openWin(id){
  if(OW[id]){
    focusW(id);
    if(OW[id].min)restoreW(id);
    else sndClick();
    return;
  }
  const def=WDEFS[id];if(!def)return;
  sndOpen();
  const n=Object.keys(OW).length;const[px,py]=SP[id];
  const isMob=window.innerWidth<=768;
  const el=document.createElement('div');el.className='win anim-open';el.id='w-'+id;
  const ww=isMob?Math.min(def.w,window.innerWidth-10):def.w;
  const wh=isMob?Math.min(def.h,window.innerHeight-60):def.h;
  const wl=isMob?Math.max(2,(window.innerWidth-ww)/2):Math.min(px+n*16,window.innerWidth-ww-10);
  const wt=isMob?20:Math.min(py+n*16,window.innerHeight-wh-56);
  el.style.cssText=`width:${ww}px;height:${wh}px;left:${wl}px;top:${wt}px;z-index:${++zT}`;
  el.innerHTML=mkWinHTML(id,def);
  document.getElementById('wins').appendChild(el);
  OW[id]={el,min:false,max:false,orig:null};
  addTB(id);attachW(el,id);focusW(id);
  setTimeout(()=>el.classList.remove('anim-open'),380);
  afterOpen(id);
}

  return`<div class="win-tb" id="wtb-${id}">
    <div class="tlts">

    </div>

  </div>
  <div class="win-body" id="wb-${id}">${getContent(id)}</div>

function swLang(lang){

function runPrev(code){
  swOut('pv');const fr=document.getElementById('cframe');if(!fr)return;
  let html='';const lang=cedLang;
  if(lang==='html')html=code;
  else if(lang==='css')html=`<!DOCTYPE html><html><head><style>*{box-sizing:border-box}body{margin:0}${code}</style></head><body><div class="card"><h2>CSS Preview</h2><p>Styles applied!</p></div></body></html>`;
  else if(lang==='react')html=`<!DOCTYPE html><html><head><script src="https://unpkg.com/react@18/umd/react.development.js"><\/script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script><script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script><style>*{box-sizing:border-box}body{margin:0}</style></head><body><div id="root"></div><script type="text/babel">${code}<\/script></body></html>`;
  else if(lang==='vue')html=`<!DOCTYPE html><html><head><script src="https://unpkg.com/vue@2/dist/vue.js"><\/script><style>*{box-sizing:border-box}body{margin:0}</style></head><body>${code}</body></html>`;
  else if(lang==='angular'||lang==='ts'){
    // Strip TS types for preview execution
    let js=code.replace(/interface\s+\w+\s*\{[^}]*\}/gs,'').replace(/:\s*(string|number|boolean|void|any|never|undefined|null)(\[\])?(\s*[,;=)\n])/g,'$3').replace(/:\s*(string|number|boolean|void|any|never|undefined|null)(\[\])?\s*$/gm,'').replace(/<[A-Z]\w*>/g,'').replace(/as\s+\w+/g,'');
    html=`<!DOCTYPE html><html><head><style>*{box-sizing:border-box}body{margin:0}</style></head><body><script>${js}<\/script></body></html>`;
  }else html=code;
  try{const blob=new Blob([html],{type:'text/html'});const url=URL.createObjectURL(blob);fr.src=url;setTimeout(()=>URL.revokeObjectURL(url),4000)}catch(e){console.warn(e)}
}
function runCon(code){
  swOut('con');const con=document.getElementById('ccon');if(!con)return;
  con.innerHTML=`<div class="clog inf">// Running ${LANGS[cedLang].name}...</div>`;
  if(cedLang==='sql'){runSQL(code,con);return}
  const logs=[];
  const orig={log:console.log,error:console.error,warn:console.warn,info:console.info};
  console.log=(...a)=>logs.push({t:'',v:a.map(x=>typeof x==='object'?JSON.stringify(x,null,2):String(x)).join(' ')});
  console.error=(...a)=>logs.push({t:'err',v:a.join(' ')});
  console.warn=(...a)=>logs.push({t:'warn',v:a.join(' ')});
  console.info=(...a)=>logs.push({t:'inf',v:a.join(' ')});
  try{
    let run=code;
    if(cedLang==='ts'){
      // Better TypeScript stripping
      run=code
        .replace(/interface\s+\w+[\s\S]*?\n\}/gm,'')
        .replace(/type\s+\w+\s*=[\s\S]*?;/gm,'')
        .replace(/:\s*(string|number|boolean|void|any|never|undefined|null|String|Number|Boolean)(\[\])?\b/g,'')
        .replace(/<[A-Z]\w*(\[\])?>/g,'')
        .replace(/as\s+\w+/g,'')
        .replace(/readonly\s+/g,'')
        .replace(/public\s+|private\s+|protected\s+/g,'')
        .replace(/^\s*\/\/.*$/gm,'');// remove comments already handled by JS
    }
    // eslint-disable-next-line no-new-func
    new Function(run)();
  }catch(e){logs.push({t:'err',v:'❌ '+e.message})}
  finally{Object.assign(console,orig)}
  if(!logs.length)logs.push({t:'ok',v:'✓ Executed successfully (no output)'});
  logs.forEach(l=>{const d=document.createElement('div');d.className='clog '+(l.t);d.textContent=l.v;con.appendChild(d)});
  con.scrollTop=1e9;
}
function runSQL(code,con){
  const lines=code.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('--'));
  const tables={};
  lines.forEach(line=>{
    try{
      if(/CREATE TABLE/i.test(line)){const m=line.match(/CREATE TABLE (\w+)/i);if(m){tables[m[1].toUpperCase()]={rows:[]};const d=document.createElement('div');d.className='clog ok';d.textContent='✓ Table created: '+m[1];con.appendChild(d)}}
      else if(/INSERT INTO/i.test(line)){const m=line.match(/INSERT INTO (\w+)\s+VALUES\s*\((.+)\)/i);if(m){const t=m[1].toUpperCase();if(!tables[t])tables[t]={rows:[]};const vals=m[2].split(',').map(v=>v.trim().replace(/^['"]|['"]$/g,''));tables[t].rows.push(vals);const d=document.createElement('div');d.className='clog';d.textContent='→ Inserted: ['+vals.join(', ')+']';con.appendChild(d)}}
      else if(/SELECT/i.test(line)){const m=line.match(/FROM (\w+)/i);const t=m?m[1].toUpperCase():null;const d=document.createElement('div');d.className='clog inf';if(t&&tables[t]){d.textContent='SELECT from '+m[1]+': '+tables[t].rows.length+' row(s)';con.appendChild(d);tables[t].rows.forEach((r,i)=>{const rd=document.createElement('div');rd.className='clog ok';rd.textContent='  ['+i+'] '+r.join(' | ');con.appendChild(rd)})}else{d.textContent='SELECT: table not found (insert rows first)';d.className='clog warn';con.appendChild(d)}}
    }catch(e){const d=document.createElement('div');d.className='clog err';d.textContent='SQL Error: '+e.message;con.appendChild(d)}
  });
  con.scrollTop=1e9;
}

let snakeIV=null;

function snkTick(){

function drawSnk(){
  const cv=document.getElementById('s-c');if(!cv)return;const ctx=cv.getContext('2d');const S=SS;
  ctx.fillStyle='#01010a';ctx.fillRect(0,0,cv.width,cv.height);ctx.strokeStyle='rgba(94,184,255,.03)';ctx.lineWidth=1;
  for(let x=0;x<cv.width;x+=SSZ){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke()}
  for(let y=0;y<cv.height;y+=SSZ){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke()}
  S.snake.forEach((s,i)=>{const t=i/S.snake.length;const col=`hsl(${200+t*70},80%,${57-t*17}%)`;ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=i===0?9:2;ctx.fillRect(s.x*SSZ+1,s.y*SSZ+1,SSZ-2,SSZ-2);if(i===0){ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(s.x*SSZ+4,s.y*SSZ+4,2,2);ctx.fillRect(s.x*SSZ+SSZ-6,s.y*SSZ+4,2,2)}});ctx.shadowBlur=0;
  S.hue+=2;ctx.fillStyle=`hsl(${S.hue},90%,62%)`;ctx.shadowColor=`hsl(${S.hue},90%,62%)`;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(S.food.x*SSZ+SSZ/2,S.food.y*SSZ+SSZ/2,SSZ/2-1,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.font='bold 7px JetBrains Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⬡',S.food.x*SSZ+SSZ/2,S.food.y*SSZ+SSZ/2);ctx.textAlign='left';ctx.textBaseline='alphabetic';
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('s-c'))return;
  const M={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
  const nd=M[e.code];if(!nd)return;
  if(!SS.started){startSnakeGame();return}
  if(nd.x===-SS.dir.x&&nd.y===-SS.dir.y)return;
  SS.dir=nd;if(e.code.startsWith('Arrow'))e.preventDefault();
});

// ════════════════════════════════════════
//  GAME 3 — TETRIS
// ════════════════════════════════════════
let tetIV=null;
let TS={board:null,cur:null,next:null,sc:0,ln:0,run:false,drop:0};
const TW=10,TH=20,TB=20;
const TPCS=[{s:[[1,1,1,1]],c:'#5eb8ff'},{s:[[1,1],[1,1]],c:'#ffb347'},{s:[[0,1,0],[1,1,1]],c:'#c084fc'},{s:[[1,0,0],[1,1,1]],c:'#ff7b7b'},{s:[[0,0,1],[1,1,1]],c:'#5dde8a'},{s:[[1,1,0],[0,1,1]],c:'#fde047'},{s:[[0,1,1],[1,1,0]],c:'#67e8f9'}];
function trnd(){const p=TPCS[~~(Math.random()*TPCS.length)];return{s:p.s.map(r=>[...r]),c:p.c,x:3,y:0}}
function trot(s){return s[0].map((_,i)=>s.map(r=>r[i]).reverse())}
function tvld(s,ox,oy){return s.every((row,y)=>row.every((v,x)=>!v||(ox+x>=0&&ox+x<TW&&oy+y<TH&&!TS.board[oy+y]?.[ox+x])))}
function startTetrisGame(){if(!document.getElementById('t-c'))return;document.getElementById('t-ov').style.display='none';rstT();TS.run=true;if(tetIV)clearInterval(tetIV);tetIV=setInterval(tetTick,33)}
function restartTetris(){if(tetIV)clearInterval(tetIV);if(!document.getElementById('t-c'))return;document.getElementById('t-ov').style.display='none';rstT();TS.run=true;tetIV=setInterval(tetTick,33);sndClick()}
function rstT(){TS.board=Array.from({length:TH},()=>Array(TW).fill(0));TS.sc=0;TS.ln=0;TS.drop=0;TS.cur=trnd();TS.next=trnd();const ss=document.getElementById('tet-sc'),sl=document.getElementById('tet-ln');if(ss)ss.textContent='0';if(sl)sl.textContent='0';drawTN()}
function tetTick(){if(!document.getElementById('t-c')){clearInterval(tetIV);return}if(!TS.run)return;TS.drop++;if(TS.drop>=30){TS.drop=0;if(tvld(TS.cur.s,TS.cur.x,TS.cur.y+1))TS.cur.y++;else tplace()}drawT()}
function tplace(){TS.cur.s.forEach((row,y)=>row.forEach((v,x)=>{if(v)TS.board[TS.cur.y+y][TS.cur.x+x]=TS.cur.c}));let cl=0;for(let y=TH-1;y>=0;y--){if(TS.board[y].every(c=>c)){TS.board.splice(y,1);TS.board.unshift(Array(TW).fill(0));cl++;y++}}if(cl){TS.ln+=cl;TS.sc+=cl*100*(cl>1?cl:1);sndNotif();const ss=document.getElementById('tet-sc'),sl=document.getElementById('tet-ln');if(ss)ss.textContent=TS.sc;if(sl)sl.textContent=TS.ln}TS.cur=TS.next||trnd();TS.next=trnd();if(!tvld(TS.cur.s,TS.cur.x,TS.cur.y)){TS.run=false;tetGO()}drawTN()}
function tetGO(){sndError();const cv=document.getElementById('t-c');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,cv.width,cv.height);ctx.textAlign='center';ctx.fillStyle='#ff7b7b';ctx.font='bold 13px Syne,sans-serif';ctx.fillText('GAME OVER',cv.width/2,cv.height/2-8);ctx.fillStyle='#5eb8ff';ctx.font='11px JetBrains Mono,monospace';ctx.fillText('Score: '+TS.sc,cv.width/2,cv.height/2+8);ctx.fillStyle='#ffb347';ctx.font='10px JetBrains Mono,monospace';ctx.fillText('Tap ↺ Restart',cv.width/2,cv.height/2+24);ctx.textAlign='left'}
function drawT(){const cv=document.getElementById('t-c');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#01010a';ctx.fillRect(0,0,cv.width,cv.height);ctx.strokeStyle='rgba(94,184,255,.03)';ctx.lineWidth=1;for(let x=0;x<TW;x++){ctx.beginPath();ctx.moveTo(x*TB,0);ctx.lineTo(x*TB,TH*TB);ctx.stroke()}for(let y=0;y<TH;y++){ctx.beginPath();ctx.moveTo(0,y*TB);ctx.lineTo(TW*TB,y*TB);ctx.stroke()}TS.board.forEach((row,y)=>row.forEach((c,x)=>{if(c){ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=5;ctx.fillRect(x*TB+1,y*TB+1,TB-2,TB-2);ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,.13)';ctx.lineWidth=.5;ctx.strokeRect(x*TB+1,y*TB+1,TB-2,TB-2)}}));if(TS.cur){let gy=TS.cur.y;while(tvld(TS.cur.s,TS.cur.x,gy+1))gy++;TS.cur.s.forEach((row,y)=>row.forEach((v,x)=>{if(v){ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect((TS.cur.x+x)*TB+1,(gy+y)*TB+1,TB-2,TB-2)}}));TS.cur.s.forEach((row,y)=>row.forEach((v,x)=>{if(v){ctx.fillStyle=TS.cur.c;ctx.shadowColor=TS.cur.c;ctx.shadowBlur=6;ctx.fillRect((TS.cur.x+x)*TB+1,(TS.cur.y+y)*TB+1,TB-2,TB-2);ctx.shadowBlur=0}}))}}
function drawTN(){const nc=document.getElementById('t-nx');if(!nc||!TS.next)return;const nctx=nc.getContext('2d');const N=TS.next;nctx.fillStyle='#01010a';nctx.fillRect(0,0,nc.width,nc.height);const os=2;N.s.forEach((row,y)=>row.forEach((v,x)=>{if(v){nctx.fillStyle=N.c;nctx.shadowColor=N.c;nctx.shadowBlur=5;nctx.fillRect((x+os)*TB+1,(y+os)*TB+1,TB-2,TB-2);nctx.shadowBlur=0}}))}
function tetKey(code){if(!TS.run){if(code==='ArrowUp')startTetrisGame();return}if(code==='ArrowLeft'&&tvld(TS.cur.s,TS.cur.x-1,TS.cur.y))TS.cur.x--;else if(code==='ArrowRight'&&tvld(TS.cur.s,TS.cur.x+1,TS.cur.y))TS.cur.x++;else if(code==='ArrowUp'){const r=trot(TS.cur.s);if(tvld(r,TS.cur.x,TS.cur.y))TS.cur.s=r}else if(code==='ArrowDown'){if(tvld(TS.cur.s,TS.cur.x,TS.cur.y+1))TS.cur.y++;else tplace()}else if(code==='Space'){let gy=TS.cur.y;while(tvld(TS.cur.s,TS.cur.x,gy+1))gy++;TS.cur.y=gy;tplace()}drawT()}
document.addEventListener('keydown',e=>{if(!document.getElementById('t-c'))return;if(!TS.run){if(e.code==='ArrowUp'){startTetrisGame();return}return}tetKey(e.code);if(e.code.startsWith('Arrow')||e.code==='Space')e.preventDefault()});

//  NOTIFICATION
// ════════════════════════════════════════
function notify(title,msg){document.querySelectorAll('.notif').forEach(n=>n.remove());const n=document.createElement('div');n.className='notif';n.innerHTML=`<div class="ntitle">${title}</div>${msg}`;document.body.appendChild(n);setTimeout(()=>n.remove(),3100)}

document.getElementById('desk').addEventListener('contextmenu',e=>{e.preventDefault();const m=document.getElementById('ctx');m.style.display='block';m.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';m.style.top=Math.min(e.clientY,window.innerHeight-160)+'px';sndClick()});
document.addEventListener('click',e=>{if(!e.target.closest('#ctx'))hCtx();if(!e.target.closest('#wpbar')&&!e.target.closest('.tb-wpb'))hWP()});
document.addEventListener('touchstart',e=>{if(!e.target.closest('#ctx'))hCtx();if(!e.target.closest('#wpbar')&&!e.target.closest('.tb-wpb'))hWP()},{passive:true});
function hCtx(){document.getElementById('ctx').style.display='none'}

function startDesk(){
  document.getElementById('desk').style.display='block';
  document.getElementById('sound-btn').style.display='flex';
  startWP(0);placeIcons();
  updLns();// init line numbers for code editor
  notify('KartikOS v6.0','Welcome! Double-tap icons to open apps 🚀');
  setTimeout(()=>openWin('about'),700);
}
window.addEventListener('resize',()=>{const c=document.getElementById('wp');if(c.width)startWP(wpI)});

// Init line numbers after DOM ready
function updLns(){const ta=document.getElementById('cta'),ln=document.getElementById('clns');if(!ta||!ln)return;const n=ta.value.split('\n').length;ln.innerHTML=Array.from({length:n},(_,i)=>`<div class="ced-ln">${i+1}</div>`).join('')}
</script>
